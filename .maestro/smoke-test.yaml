appId: com.brittany.mysky
---
# MySky - Quick Smoke Test
# Run this after the app is already launched via Expo dev client
#
# USAGE:
# 1. Start Metro: npm run dev
# 2. Open the app in the simulator (make sure it's past the Expo launcher)
# 3. Run: maestro test .maestro/smoke-test.yaml

# Don't relaunch - just work with the current app state
- assertVisible:
    text: "Today|Patterns|Archive|Identity|Settings"
    timeout: 5000

- takeScreenshot: smoke_01_current_state

# Navigate through all main tabs
- tapOn: 
    text: "Today"
    optional: true
- takeScreenshot: smoke_02_today

- tapOn: "Patterns"
- takeScreenshot: smoke_03_patterns

- tapOn: "Archive" 
- takeScreenshot: smoke_04_archive

- tapOn: "Identity"
- takeScreenshot: smoke_05_identity

- tapOn: "Settings"
- takeScreenshot: smoke_06_settings

# Return home
- tapOn: "Today"
- takeScreenshot: smoke_07_final

# Success!
- assertVisible: "Today"
